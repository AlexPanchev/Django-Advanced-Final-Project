{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <h1 class="mb-4">Edit Profile</h1>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-green btn-lg">Save Changes</button>
    </form>
</div>
{% endblock %}
