{% extends "base.html" %}

{% block content %}
<div class="container py-5">
    <h1 class="mb-4">Create an Account</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-green btn-lg">Register</button>
    </form>

    <p class="mt-3">
        Already have an account?
        <a href="{% url 'login' %}">Login here</a>.
    </p>
</div>
{% endblock %}
